<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin License Manager - SPOS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { background: var(--bg-base); }
    .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; }
    .request-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      display: flex; justify-content: space-between; align-items: center;
    }
    .keys-display { font-family: monospace; font-size: 1.1rem; letter-spacing: 1px; color: var(--accent-start); font-weight: bold; background: var(--bg-base); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); }
  </style>
</head>
<body>

  <div class="admin-container animate-fade-in">
    <div class="flex-between mb-24">
      <div>
        <h1 class="page-title"><i class="fas fa-server text-accent"></i> Admin License Manager</h1>
        <p class="text-muted text-sm mt-4">Manage incoming license requests from client POS computers.</p>
      </div>
      <button class="btn btn-secondary" onclick="loadRequests()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>

    <div id="requests-container">
      <!-- Populated via JS -->
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../assets/js/app.js"></script>
  <script>
    function loadRequests() {
      const container = document.getElementById('requests-container');
      const req = JSON.parse(localStorage.getItem('spos_license_request'));
      
      if (!req) {
        container.innerHTML = `<div class="text-center p-24 text-muted"><i class="fas fa-inbox mb-12" style="font-size:2rem"></i><br>No incoming license requests.</div>`;
        return;
      }

      let statusBadge = '';
      if(req.status === 'PENDING') statusBadge = `<span class="badge badge-warning">PENDING</span>`;
      else if(req.status === 'APPROVED') statusBadge = `<span class="badge badge-success">APPROVED</span>`;
      else statusBadge = `<span class="badge badge-danger">DECLINED</span>`;

      container.innerHTML = `
        <div class="request-card">
          <div>
            <div class="text-xs text-muted mb-4">${new Date(req.timestamp).toLocaleString()}</div>
            <div class="font-bold mb-8">Client Machine ID: <span class="keys-display ml-8">${req.hwid}</span></div>
            <div class="font-bold mb-8">Provided Keys: <span class="keys-display ml-8">${req.keys}</span></div>
            <div class="mt-8">Status: ${statusBadge}</div>
          </div>
          <div class="flex gap-12">
            ${req.status === 'PENDING' ? `
              <button class="btn btn-danger" onclick="updateStatus('DECLINED')"><i class="fas fa-times"></i> Decline</button>
              <button class="btn btn-success" onclick="updateStatus('APPROVED')"><i class="fas fa-check"></i> Approve & Unlock</button>
            ` : `
              <button class="btn btn-ghost btn-sm" onclick="clearRequest()"><i class="fas fa-trash"></i> Clear Record</button>
            `}
          </div>
        </div>
      `;
    }

    function updateStatus(status) {
      const req = JSON.parse(localStorage.getItem('spos_license_request'));
      if(req) {
        req.status = status;
        localStorage.setItem('spos_license_request', JSON.stringify(req));
        showToast(`Request ${status}`, status === 'APPROVED' ? 'success' : 'error');
        loadRequests();
      }
    }

    function clearRequest() {
      if(confirm('Are you sure you want to delete this request record?')) {
        localStorage.removeItem('spos_license_request');
        if (localStorage.getItem('spos_license_state') !== 'APPROVED') {
          localStorage.removeItem('spos_license_state');
        }
        loadRequests();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadRequests();
      setInterval(loadRequests, 3000); // Auto refresh
    });
  </script>
</body>
</html>
