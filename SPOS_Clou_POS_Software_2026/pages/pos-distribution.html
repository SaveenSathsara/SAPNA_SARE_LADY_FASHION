<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distribution POS - SPOS Cloud POS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pos.css">
</head>
<body>

  <div class="app-layout" id="app-layout">
    <div id="page-content" class="hidden">
      
      <div class="pos-terminal">
        <!-- Products Panel -->
        <div class="pos-products-panel">
          <div class="pos-toolbar" style="background:var(--purple); border-bottom-color:var(--purple)">
            <div class="pos-search">
              <i class="fas fa-search" style="color:var(--purple)"></i>
              <input type="text" id="pos-search-input" placeholder="Search wholesale items...">
            </div>
            <button class="btn btn-primary btn-icon" style="background:var(--purple)"><i class="fas fa-truck-loading"></i></button>
            <button class="btn btn-primary btn-icon" style="background:var(--purple)"><i class="fas fa-undo-alt"></i></button>
          </div>

          <div class="pos-categories" id="pos-categories"></div>
          <div class="pos-products-grid" id="pos-products-grid"></div>
        </div>

        <!-- Cart Panel -->
        <div class="pos-cart-panel" id="pos-cart-panel">
          <div class="cart-header">
            <div class="cart-title">
              <span>Van Sale Invoice</span>
              <span class="badge" style="background:var(--purple); color:#fff" id="invoice-no">DST-1000</span>
            </div>
            <div class="cart-meta">
              <button class="cart-meta-btn"><i class="fas fa-store-alt"></i> Select Shop / Dealer</button>
            </div>
          </div>

          <div class="cart-items" id="cart-items"></div>

          <div class="cart-summary">
            <div class="summary-row">
              <span class="summary-label">Subtotal</span>
              <span id="cart-subtotal">LKR 0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total Payable</span>
              <span id="cart-total" style="color:var(--purple)">LKR 0.00</span>
            </div>
          </div>

          <div class="pos-payment-section">
            <div class="payment-methods-row">
              <button class="payment-method-btn selected" style="--accent-start:var(--purple)"><i class="fas fa-money-bill-wave"></i> Cash</button>
              <button class="payment-method-btn"><i class="fas fa-money-check"></i> Cheque</button>
              <button class="payment-method-btn"><i class="fas fa-book-open"></i> Credit</button>
            </div>
            <button class="btn-checkout" style="background:var(--purple); box-shadow:0 4px 24px rgba(155,89,182,0.3)" id="btn-checkout" onclick="alert('Distribution Sale Completed')">Complete Sale <span id="btn-checkout-amt">LKR 0.00</span></button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/pos-engine.js"></script>
  <script>
    let engine;
    let currentCat = 'All';

    document.addEventListener('DOMContentLoaded', () => {
      initPage('pos-distribution', 'Distribution POS');
      engine = new POSEngine('distribution');
      engine.onCartUpdate = renderCart;
      
      renderCategories();
      renderProducts();
      renderCart();
    });

    function renderCategories() {
      const cats = engine.getCategories();
      document.getElementById('pos-categories').innerHTML = cats.map(c => `
        <button class="cat-tab ${c === currentCat ? 'active' : ''}" style="--accent-start:var(--purple)" onclick="selectCategory('${c}')">${c}</button>
      `).join('');
    }

    function selectCategory(cat) { currentCat = cat; renderCategories(); renderProducts(cat); }

    function renderProducts(cat = currentCat, search = '') {
      const prods = engine.getProducts(cat, search);
      document.getElementById('pos-products-grid').innerHTML = prods.map(p => `
        <div class="pos-product-item" style="border-color:rgba(155,89,182,0.2)" onclick="addToCart('${p.id}')">
          <div class="pos-item-icon">${p.icon}</div>
          <div class="pos-item-name">${p.name}</div>
          <div class="pos-item-price" style="color:var(--purple)">${formatCurrency(p.price)}</div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const prod = POSEngine.PRODUCTS.distribution.find(p => p.id === id);
      if(prod) engine.addItem(prod);
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      document.getElementById('invoice-no').textContent = engine.invoiceNo;
      
      if (engine.cart.length === 0) {
        container.innerHTML = `<div class="cart-empty"><i class="fas fa-truck cart-empty-icon" style="color:var(--purple)"></i><div class="cart-empty-text">No items selected.</div></div>`;
        document.getElementById('btn-checkout').disabled = true;
      } else {
        container.innerHTML = engine.cart.map(i => `
          <div class="cart-item" style="border-left:3px solid var(--purple)">
            <div class="cart-item-info">
              <div class="cart-item-name">${i.name}</div>
              <div class="cart-item-price">${formatCurrency(i.price)}</div>
            </div>
            <div class="qty-control">
              <button class="qty-btn" onclick="engine.updateQty('${i.id}', ${i.qty - 1})">-</button>
              <div class="qty-val">${i.qty}</div>
              <button class="qty-btn" onclick="engine.updateQty('${i.id}', ${i.qty + 1})">+</button>
            </div>
            <div class="cart-item-sub" style="color:var(--purple)">${formatCurrency(i.price * i.qty)}</div>
            <button class="cart-item-remove" onclick="engine.removeItem('${i.id}')"><i class="fas fa-times"></i></button>
          </div>
        `).join('');
        document.getElementById('btn-checkout').disabled = false;
      }

      document.getElementById('cart-subtotal').textContent = formatCurrency(engine.subtotal);
      const totalStr = formatCurrency(engine.total);
      document.getElementById('cart-total').textContent = totalStr;
      document.getElementById('btn-checkout-amt').textContent = totalStr;
    }
  </script>
</body>
</html>
