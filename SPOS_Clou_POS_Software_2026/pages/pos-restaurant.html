<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant POS - SPOS Cloud POS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pos.css">
</head>
<body>

  <div class="app-layout" id="app-layout">
    <div id="page-content" class="hidden">
      
      <div class="pos-terminal">
        <!-- Products Panel -->
        <div class="pos-products-panel">
          <div class="pos-toolbar" style="background:var(--danger-dim); border-bottom-color:var(--danger)">
            <button class="btn btn-danger btn-icon" title="Table Map" onclick="toggleTables()"><i class="fas fa-th"></i></button>
            <div class="pos-search" style="flex:1">
              <i class="fas fa-search" style="color:var(--danger)"></i>
              <input type="text" id="pos-search-input" placeholder="Search menu...">
            </div>
            <button class="btn btn-danger btn-icon" title="KDS (Kitchen Display)" onclick="toggleKDS()"><i class="fas fa-fire"></i></button>
          </div>

          <!-- Table View Overlay -->
          <div id="table-view" style="display:none; position:absolute; top:48px; left:0; right:0; bottom:0; background:var(--bg-base); z-index:10; overflow-y:auto;">
            <div class="p-16 flex-between border-b" style="border-color:var(--border)">
              <h3 class="font-bold">Select Table</h3>
              <div class="flex gap-8 text-sm">
                <span class="text-success"><i class="fas fa-circle"></i> Free</span>
                <span class="text-danger"><i class="fas fa-circle"></i> Occupied</span>
              </div>
            </div>
            <div class="table-map-grid" id="table-map">
              <!-- JS Populated -->
            </div>
          </div>

          <!-- KDS Overlay -->
          <div id="kds-view" style="display:none; position:absolute; top:48px; left:0; right:0; bottom:0; background:var(--bg-base); z-index:10; overflow-y:auto; padding:16px">
            <h3 class="font-bold mb-16">Kitchen Display System (KDS)</h3>
            <div class="grid grid-3" id="kds-grid">
              <div class="kds-ticket">
                <div class="kds-header">
                  <span class="kds-table text-danger">Table 04</span>
                  <span class="kds-time">12:30 PM (5m ago)</span>
                </div>
                <div class="kds-items">
                  <div class="kds-item"><span class="kds-qty">2x</span> <span>Fried Rice</span></div>
                  <div class="kds-item"><span class="kds-qty">1x</span> <span>Chicken Curry</span></div>
                </div>
                <div class="kds-footer text-center">
                  <button class="btn btn-sm btn-success" style="width:100%" onclick="this.closest('.kds-ticket').remove()">Mark Ready</button>
                </div>
              </div>
            </div>
          </div>

          <div class="pos-categories" id="pos-categories"></div>
          <div class="pos-products-grid" id="pos-products-grid"></div>
        </div>

        <!-- Cart Panel -->
        <div class="pos-cart-panel" id="pos-cart-panel">
          <div class="cart-header">
            <div class="cart-title">
              <span id="active-order-type">Dine In <span class="badge badge-danger" id="active-table">T-01</span></span>
              <span class="badge badge-danger" id="invoice-no">RST-1000</span>
            </div>
            <div class="cart-meta">
              <button class="cart-meta-btn" onclick="setOrderType('takeaway')"><i class="fas fa-shopping-bag"></i> Takeaway</button>
              <button class="cart-meta-btn" onclick="clearCart()"><i class="fas fa-trash-alt text-danger"></i> Void</button>
            </div>
          </div>

          <div class="cart-items" id="cart-items"></div>

          <div class="cart-summary">
            <div class="summary-row">
              <span class="summary-label">Subtotal (<span id="item-count">0</span> items)</span>
              <span id="cart-subtotal">LKR 0.00</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Service Charge (10%)</span>
              <span id="cart-sc">LKR 0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="cart-total" class="text-danger">LKR 0.00</span>
            </div>
          </div>

          <div class="pos-payment-section">
            <div class="payment-methods-row">
              <button class="payment-method-btn selected" style="--accent-start:var(--danger)"><i class="fas fa-money-bill-wave"></i> Cash</button>
              <button class="payment-method-btn"><i class="fas fa-credit-card"></i> Card</button>
              <button class="payment-method-btn"><i class="fas fa-qrcode"></i> QR Pay</button>
            </div>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-secondary" style="flex:1; font-weight:700" onclick="sendToKitchen()"><i class="fas fa-fire"></i> KOT</button>
              <button class="btn-checkout" style="flex:2; background:var(--danger); box-shadow:0 4px 24px rgba(231,76,60,0.3)" id="btn-checkout" onclick="alert('Payment module opened')">Pay <span id="btn-checkout-amt">LKR 0.00</span></button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/pos-engine.js"></script>
  <script>
    let engine;
    let currentCat = 'All';
    let currentTable = 'T-01';

    // Mock Tables
    const tables = [
      { id: 'T-01', status: 'selected', pax: 2 },
      { id: 'T-02', status: 'free', pax: 4 },
      { id: 'T-03', status: 'occupied', pax: 4, time: '12:15 PM' },
      { id: 'T-04', status: 'occupied', pax: 2, time: '12:30 PM' },
      { id: 'T-05', status: 'reserved', pax: 6, time: '01:00 PM' },
      { id: 'T-06', status: 'free', pax: 2 },
      { id: 'T-07', status: 'free', pax: 4 },
      { id: 'T-08', status: 'free', pax: 8 },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      initPage('pos-restaurant', 'Restaurant POS');
      engine = new POSEngine('restaurant');
      engine.onCartUpdate = renderCart;
      
      renderCategories();
      renderProducts();
      renderCart();
      renderTables();
    });

    function toggleTables() {
      const el = document.getElementById('table-view');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
      document.getElementById('kds-view').style.display = 'none';
    }

    function toggleKDS() {
      const el = document.getElementById('kds-view');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
      document.getElementById('table-view').style.display = 'none';
    }

    function renderTables() {
      document.getElementById('table-map').innerHTML = tables.map(t => `
        <div class="table-slot ${t.status}" onclick="selectTable('${t.id}')">
          <div class="table-persons"><i class="fas fa-user"></i> ${t.pax}</div>
          <div class="table-num">${t.id}</div>
          <div class="table-status">${t.status}</div>
          ${t.time ? `<div class="table-time">${t.time}</div>` : ''}
        </div>
      `).join('');
    }

    function selectTable(id) {
      tables.forEach(t => {
        if(t.status === 'selected') t.status = 'free';
        if(t.id === id && t.status === 'free') t.status = 'selected';
      });
      currentTable = id;
      document.getElementById('active-table').textContent = id;
      document.getElementById('active-order-type').innerHTML = `Dine In <span class="badge badge-danger" id="active-table">${id}</span>`;
      renderTables();
      toggleTables();
      engine.clearCart();
    }

    function setOrderType(type) {
      if(type === 'takeaway') {
        document.getElementById('active-order-type').innerHTML = `Takeaway <span class="badge badge-warning">T/A</span>`;
        currentTable = null;
      }
    }

    function renderCategories() {
      const cats = engine.getCategories();
      document.getElementById('pos-categories').innerHTML = cats.map(c => `
        <button class="cat-tab ${c === currentCat ? 'active' : ''}" style="--accent-start:var(--danger)" onclick="selectCategory('${c}')">${c}</button>
      `).join('');
    }

    function selectCategory(cat) { currentCat = cat; renderCategories(); renderProducts(cat); }

    function renderProducts(cat = currentCat, search = '') {
      const prods = engine.getProducts(cat, search);
      document.getElementById('pos-products-grid').innerHTML = prods.map(p => `
        <div class="pos-product-item" style="border-color:rgba(231,76,60,0.2)" onclick="addToCart('${p.id}')">
          <div class="pos-item-icon">${p.icon}</div>
          <div class="pos-item-name">${p.name}</div>
          <div class="pos-item-price text-danger">${formatCurrency(p.price)}</div>
        </div>
      `).join('');
    }

    function addToCart(id) {
      const prod = POSEngine.PRODUCTS.restaurant.find(p => p.id === id);
      if(prod) engine.addItem(prod);
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      document.getElementById('invoice-no').textContent = engine.invoiceNo;
      
      if (engine.cart.length === 0) {
        container.innerHTML = `<div class="cart-empty"><i class="fas fa-utensils cart-empty-icon" style="color:var(--danger)"></i><div class="cart-empty-text">Order is empty.</div></div>`;
        document.getElementById('btn-checkout').disabled = true;
      } else {
        container.innerHTML = engine.cart.map(i => `
          <div class="cart-item" style="border-left:3px solid var(--danger)">
            <div class="cart-item-info">
              <div class="cart-item-name">${i.name}</div>
              <div class="cart-item-price">${formatCurrency(i.price)}</div>
            </div>
            <div class="qty-control">
              <button class="qty-btn" onclick="engine.updateQty('${i.id}', ${i.qty - 1})">-</button>
              <div class="qty-val">${i.qty}</div>
              <button class="qty-btn" onclick="engine.updateQty('${i.id}', ${i.qty + 1})">+</button>
            </div>
            <div class="cart-item-sub text-danger">${formatCurrency(i.price * i.qty)}</div>
            <button class="cart-item-remove" onclick="engine.removeItem('${i.id}')"><i class="fas fa-times"></i></button>
          </div>
        `).join('');
        document.getElementById('btn-checkout').disabled = false;
      }

      const sc = engine.subtotal * 0.1; // 10% service charge

      document.getElementById('item-count').textContent = engine.itemCount;
      document.getElementById('cart-subtotal').textContent = formatCurrency(engine.subtotal);
      document.getElementById('cart-sc').textContent = formatCurrency(sc);
      
      const totalStr = formatCurrency(engine.total + sc);
      document.getElementById('cart-total').textContent = totalStr;
      document.getElementById('btn-checkout-amt').textContent = totalStr;
    }

    function clearCart() { if(confirm('Void this order?')) engine.clearCart(); }

    function sendToKitchen() {
      if(engine.cart.length === 0) return;
      showToast('KOT sent to kitchen printer!', 'success');
      
      // Add to KDS
      const html = `
        <div class="kds-ticket">
          <div class="kds-header">
            <span class="kds-table text-danger">${currentTable || 'Takeaway'}</span>
            <span class="kds-time">Just now</span>
          </div>
          <div class="kds-items">
            ${engine.cart.map(i => `<div class="kds-item"><span class="kds-qty">${i.qty}x</span> <span>${i.name}</span></div>`).join('')}
          </div>
          <div class="kds-footer text-center">
            <button class="btn btn-sm btn-success" style="width:100%" onclick="this.closest('.kds-ticket').remove()">Mark Ready</button>
          </div>
        </div>
      `;
      document.getElementById('kds-grid').insertAdjacentHTML('afterbegin', html);
    }
  </script>
</body>
</html>
