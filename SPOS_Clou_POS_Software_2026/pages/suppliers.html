<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers - SPOS Cloud POS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/components.css">
</head>
<body>

  <div class="app-layout" id="app-layout">
    <div id="page-content" class="hidden">
      
      <div class="page-header">
        <div>
          <h1 class="page-title">Suppliers & Vendors</h1>
          <p class="page-subtitle">Manage supply chain partners and purchase orders</p>
        </div>
        <button class="btn btn-primary" onclick="alert('Add Supplier Form')"><i class="fas fa-truck-loading"></i> New Supplier</button>
      </div>

      <div class="glass-card p-24 mb-24">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Company Name</th>
                <th>Contact Person</th>
                <th>Phone</th>
                <th>Pending Balance</th>
                <th class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="font-bold">Ceylon Beverages PLC</td>
                <td>Mr. Silva</td>
                <td>011-2345678</td>
                <td class="text-danger font-bold">LKR 125,000</td>
                <td class="text-right">
                  <button class="btn btn-ghost btn-sm"><i class="fas fa-eye"></i></button>
                </td>
              </tr>
              <tr>
                <td class="font-bold">Hemas Pharmaceuticals</td>
                <td>Dr. Fernando</td>
                <td>011-9876543</td>
                <td class="text-success font-bold">Cleared</td>
                <td class="text-right">
                  <button class="btn btn-ghost btn-sm"><i class="fas fa-eye"></i></button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initPage('suppliers', 'Supplier Management');
    });
  </script>
</body>
</html>
